{% extends "bookings/base.html" %}
{% load static %}

{% block body %}
    <div class="container d-flex align-items-center justify-content-center" style="min-height: 75vh;">
        <div class="card border-0 shadow-sm rounded-4 p-4 p-md-5" style="max-width: 440px; width: 100%; border: 1px solid #e2e8f0 !important; background: #ffffff;">

            <div class="text-center mb-4">
                <div class="d-inline-flex align-items-center justify-content-center bg-primary-subtle text-primary rounded-circle mb-3" style="width: 56px; height: 56px;">
                    <span class="fs-3">🔒</span>
                </div>
                <h2 class="fw-bold tracking-tight text-slate-900 m-0" style="font-size: 1.5rem;">Account Login</h2>
                <p class="text-muted small mt-1">Access the real-time simulation workspace</p>
            </div>

            {% if message %}
                <div class="alert alert-danger py-2.5 px-3 rounded-3 fs-7 mb-4 d-flex align-items-center gap-2" role="alert">
                    <span>⚠️</span> <span>{{ message }}</span>
                </div>
            {% endif %}

            <form action="{% url 'login' %}" method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label for="username" class="form-label fw-semibold text-secondary small">Username</label>
                    <input type="text" name="username" id="username" class="form-control px-3 py-2" placeholder="Enter username" required autocomplete="username" style="border-radius: 8px;">
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label fw-semibold text-secondary small">Password</label>
                    <input type="password" name="password" id="password" class="form-control px-3 py-2" placeholder="••••••••" required autocomplete="current-password" style="border-radius: 8px;">
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2.5 fw-bold mb-3 shadow-sm" style="border-radius: 8px; background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); border: none;">
                    Login
                </button>
            </form>

            <div class="text-center mt-3 pt-3 border-top">
                <span class="text-muted small">New to the interface? </span>
                <a href="{% url 'register' %}" class="small fw-semibold text-decoration-none text-primary">Create an account</a>
            </div>

        </div>
    </div>
{% endblock %}
